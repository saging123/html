<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    
    
    <style>
        table{
            border-collapse: collapse;
            width: 100%;
            
        }
        td, th{
            border:1px solid #000;
            padding:10px;
        }
        th{
            background-color: blueviolet;
            color:#fff;
        }
        td{
            text-align: center;
        }
        tr:nth-child(odd){
            background-color: beige;
        }
        tr:nth-child(even){
            background-color: aquamarine;
        }
        tr{
            font-size: 12px;
        }
        td:hover{
            background-color: crimson;
        }
        tr:hover{
            background-color: chocolate;
        }
        .div-btn-container{
            margin-top: 20px;
            padding-left: 100px;
        }
        .btn-custom{
            width: 100px;
            height: 40px;
            background-color: #03045e;
            color:#fff;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        .btn-custom:hover{
            background-color: #0077b6;
        }
    </style>




    </head>
    <body>
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Gender</th>
                    <th>Course</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Juan</td>
                    <td>12</td>
                    <td>M</td>
                    <td>BSCS</td>
                </tr>
                 <tr>
                    <td>John</td>
                    <td>20</td>
                    <td>M</td>
                    <td>BSIT</td>
                </tr>
                 <tr>
                    <td>Sasha</td>
                    <td>19</td>
                    <td>F</td>
                    <td>BSHM</td>
                </tr>
                  <tr>
                    <td>Joana</td>
                    <td>20</td>
                    <td>F</td>
                    <td>BSEE</td>
                </tr>
                  <tr>
                    <td>Robert</td>
                    <td>19</td>
                    <td>M</td>
                    <td>BSIS</td>
                </tr>

            </tbody>
        </table>

        <div class="div-btn-container">
            <button class="btn-custom">Login</button>
        </div>

    </body>
</html>

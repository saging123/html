<html>

<head>
    <title>Profile</title>

    <style>
        .text-white{
            color: #fff;
        }
        .container{
            margin-left: 25%;
            width: 100%;
        }
        .cover{
            background-color: blueviolet;
            padding-top: 20px;
            padding-bottom: 20px;
        }
        .card{
            width: 50%;
            border: 1px solid #000;
            height: 300px;
            font-family: Arial, Helvetica, sans-serif;
        }
        .profile-name{
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .profile-pic-wrapper{
            text-align: center;
            margin-bottom: 10px;
        }
        .profile-pic{
            height:70px;
            width: 70px;
            border-radius: 50%;
            border: 3px solid #fff;
        }
        .profile-fullname{
            text-align: center;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .profile-addr{
            text-align: center;
            font-size: 12px;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- profile -->
        <div class="card">
            <!-- cover -->
            <div class="cover">
                <div class="profile-name text-white">Profile</div>
                <div class="profile-pic-wrapper">
                    <img class="profile-pic" src="picture.webp" />
                </div>
                <div class="profile-fullname text-white">Juan Dela Cruz</div>
                <div class="profile-addr text-white">Bacolod City</div>
            </div>


            <!-- profile body -->
        </div>
    </div>


</body>

</html>
